<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>click to play</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            cursor: pointer;
        }
        #video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            font-size: 2rem;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay">click to play faggot</div>
    
    <video id="video-bg" loop playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('video-bg');
        const overlay = document.getElementById('overlay');

        document.body.addEventListener('click', () => {
            overlay.style.display = 'none';
            video.style.display = 'block';
            video.play();
        });
    </script>

</body>
</html>
